name: Update essays submodule

on:
  repository_dispatch:
    types: [essays-updated]

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PAT_TOKEN }}

      - name: Update essays submodule
        run: |
          git submodule update --remote src/content/denken
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add src/content/denken
          git diff --staged --quiet || git commit -m "auto: update essays submodule"
          git push
