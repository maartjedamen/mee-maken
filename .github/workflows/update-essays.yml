name: Update essays submodule

on:
  repository_dispatch:
    types: [essays-updated]

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Update essays submodule
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git submodule update --remote --force src/content/denken
          git add src/content/denken
          git diff --staged --quiet || git commit -m "auto: update essays submodule pointer"
          git push

      - name: Trigger Netlify build
        run: |
          curl -X POST -d '{}' ${{ secrets.NETLIFY_BUILD_HOOK }}
